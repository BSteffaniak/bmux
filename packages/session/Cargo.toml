[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Session management for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "management", "session", "terminal"]
license     = { workspace = true }
name        = "bmux_session"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_session_models = { workspace = true }

# External dependencies
anyhow  = { workspace = true, features = ["std"] }
tracing = { workspace = true, features = ["std"] }


[features]
# Default features
default = ["serde"]

# Development features
fail-on-warnings = ["bmux_session_models/fail-on-warnings"]

# Serialization features
serde = ["bmux_session_models/serde"]
