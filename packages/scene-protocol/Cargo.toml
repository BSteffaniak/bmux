[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Typed scene-decoration protocol shared by bmux core and any decoration plugin"
edition     = { workspace = true }
keywords    = ["bmux", "scene", "decoration", "protocol"]
license     = { workspace = true }
name        = "bmux_scene_protocol"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_plugin_schema_macros = { workspace = true }
serde                     = { workspace = true, features = ["derive", "std"] }
uuid                      = { workspace = true, features = ["serde", "std"] }

[dev-dependencies]
serde_json = { workspace = true }

[package.metadata.cargo-machete]
# `serde` is consumed by code generated from the BPDL schema via the
# `bmux_plugin_schema_macros::schema!` proc macro; cargo-machete cannot
# see into proc-macro-generated source.
ignored = ["serde"]

[features]
default          = []
fail-on-warnings = []
