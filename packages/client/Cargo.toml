[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Client component for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "client", "multiplexer", "terminal"]
license     = { workspace = true }
name        = "bmux_client"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_config = { workspace = true }
bmux_ipc    = { workspace = true }

# External dependencies
bmux_codec = { workspace = true }
thiserror  = { workspace = true }
tokio      = { workspace = true, features = ["time", "sync", "rt"] }
tracing    = { workspace = true }
uuid       = { workspace = true, features = ["std"] }

[dev-dependencies]
bmux_server = { workspace = true }


[features]
# Default features
default = ["serde"]

# Development features
fail-on-warnings = [
    "bmux_codec/fail-on-warnings",
    "bmux_config/fail-on-warnings",
    "bmux_ipc/fail-on-warnings",
]

# Serialization features
serde = []

[package.metadata.cargo-machete]
ignored = ["bmux_server"] # dev-dependency used in integration tests
