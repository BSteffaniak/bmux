[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Client component for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "client", "multiplexer", "terminal"]
license     = { workspace = true }
name        = "bmux_client"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_clients_plugin_api         = { workspace = true }
bmux_config                     = { workspace = true }
bmux_control_catalog_plugin_api = { workspace = true }
bmux_ipc                        = { workspace = true }
bmux_performance_plugin_api     = { workspace = true }
bmux_recording_plugin_api       = { workspace = true }

# External dependencies
bmux_codec = { workspace = true }
serde      = { workspace = true, features = ["derive", "std"] }
thiserror  = { workspace = true }
tokio      = { workspace = true, features = ["time", "sync", "rt"] }
tracing    = { workspace = true }
uuid       = { workspace = true, features = ["std"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { workspace = true, features = [
    "Win32_System_Console",
    "Win32_Foundation",
] }

[dev-dependencies]
bmux_server = { workspace = true }
tempfile    = { workspace = true }


[features]
# Default features
default = ["serde"]

# Development features
fail-on-warnings = [
    "bmux_codec/fail-on-warnings",
    "bmux_config/fail-on-warnings",
    "bmux_ipc/fail-on-warnings",
]

# Serialization features
serde = []

[package.metadata.cargo-machete]
ignored = ["bmux_server"] # dev-dependency used in integration tests
