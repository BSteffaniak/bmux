[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Plugin SDK for bmux — the types and traits plugin authors need"
edition     = { workspace = true }
keywords    = ["bmux", "extensibility", "plugin", "sdk"]
license     = { workspace = true }
name        = "bmux_plugin_sdk"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_codec = { workspace = true }
semver     = { workspace = true }
serde      = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }
thiserror  = { workspace = true }
toml       = { workspace = true, features = ["parse"] }
uuid       = { workspace = true, features = ["serde", "std"] }

[features]
default          = []
fail-on-warnings = ["bmux_codec/fail-on-warnings"]
