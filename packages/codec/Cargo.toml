[package]
authors     = { workspace = true }
categories  = ["encoding"]
description = "Custom binary serialization codec for bmux IPC protocol"
edition     = { workspace = true }
keywords    = ["bmux", "codec", "serialization", "binary"]
license     = { workspace = true }
name        = "bmux_codec"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
serde = { workspace = true, features = ["std"] }

[dev-dependencies]
serde      = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }
uuid       = { workspace = true, features = ["serde", "std", "v4"] }

[features]
# Default features
default = []

# Development features
fail-on-warnings = []
