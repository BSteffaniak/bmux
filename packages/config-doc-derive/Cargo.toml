[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Proc macros for generating config documentation schema from bmux config types"
edition     = { workspace = true }
keywords    = ["bmux", "config", "derive", "documentation"]
license     = { workspace = true }
name        = "bmux_config_doc_derive"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[lib]
proc-macro = true

[dependencies]
proc-macro2 = { workspace = true, features = ["proc-macro"] }
quote = { workspace = true, features = ["proc-macro"] }
syn = { workspace = true, features = [
    "clone-impls",
    "derive",
    "extra-traits",
    "full",
    "parsing",
    "printing",
    "proc-macro",
] }
