[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Plugin system for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "extensibility", "plugin", "terminal"]
license     = { workspace = true }
name        = "bmux_plugin"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# SDK crate (re-exported for backward compatibility)
bmux_plugin_sdk = { workspace = true }

# External dependencies (host-side only)
bmux_ipc                  = { workspace = true }
bmux_recording_plugin_api = { workspace = true }
libloading                = { workspace = true }
semver                    = { workspace = true }
serde                     = { workspace = true, features = ["derive", "std"] }
serde_json                = { workspace = true }
thiserror                 = { workspace = true }
tokio                     = { workspace = true, features = ["sync"] }
toml                      = { workspace = true, features = ["parse"] }
tracing                   = { workspace = true, features = ["std"] }
uuid                      = { workspace = true, features = ["serde", "std"] }

[dev-dependencies]
serial_test = { workspace = true }
tokio       = { workspace = true, features = ["sync", "macros", "rt"] }


[features]
# Default features
default = []

# Development features
fail-on-warnings = [
    "bmux_ipc/fail-on-warnings",
    "bmux_plugin_sdk/fail-on-warnings",
]
