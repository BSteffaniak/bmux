[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Plugin system for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "extensibility", "plugin", "terminal"]
license     = { workspace = true }
name        = "bmux_plugin"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# External dependencies
bmux_client = { workspace = true }
bmux_config = { workspace = true }
bmux_ipc    = { workspace = true }
libloading  = { workspace = true }
postcard    = { workspace = true, features = ["alloc"] }
semver      = { workspace = true }
serde       = { workspace = true, features = ["derive", "std"] }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true, features = ["rt", "time"] }
toml        = { workspace = true, features = ["parse"] }
uuid        = { workspace = true, features = ["serde", "std"] }


[features]
# Default features
default = []

# Development features
fail-on-warnings = []
