[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Performance helper utilities for bmux scripts"
edition     = { workspace = true }
keywords    = ["bmux", "perf", "benchmark"]
license     = { workspace = true }
name        = "bmux_perf_tools"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[[bin]]
name = "bmux-perf-tools"
path = "src/main.rs"

[dependencies]
bmux_plugin     = { workspace = true }
bmux_plugin_sdk = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
toml            = { workspace = true, features = ["parse"] }

[features]
fail-on-warnings = []
