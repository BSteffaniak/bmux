[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Terminal image protocol support for bmux (Sixel, Kitty graphics, iTerm2)"
edition     = { workspace = true }
keywords    = ["bmux", "image", "sixel", "kitty", "terminal"]
license     = { workspace = true }
name        = "bmux_image"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_ipc = { workspace = true }
serde    = { workspace = true, features = ["derive", "std"] }
uuid     = { workspace = true, features = ["std"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_Console",
    "Win32_System_Threading",
] }

[features]
compression-lz4  = ["bmux_ipc/compression-lz4"]
compression-zstd = ["bmux_ipc/compression-zstd"]
default          = []
fail-on-warnings = ["bmux_ipc/fail-on-warnings"]
iterm2           = []
kitty            = []
sixel            = []
