[package]
authors     = { workspace = true }
categories  = ["config", "development-tools"]
description = "Configuration management for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "config", "multiplexer", "terminal"]
license     = { workspace = true }
name        = "bmux_config"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_config_doc        = { workspace = true }
bmux_config_doc_derive = { workspace = true }
bmux_event             = { workspace = true, features = ["serde"] }
bmux_keybind           = { workspace = true }

# External dependencies
dirs      = { workspace = true }
serde     = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
toml      = { workspace = true, features = ["display", "parse"] }


[features]
# Default features
default = []

# Development features
fail-on-warnings = [
    "bmux_event/fail-on-warnings",
    "bmux_keybind/fail-on-warnings",
]
