[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Server component for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "multiplexer", "server", "terminal"]
license     = { workspace = true }
name        = "bmux_server"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_clients_plugin             = { workspace = true }
bmux_clients_plugin_api         = { workspace = true }
bmux_config                     = { workspace = true }
bmux_contexts_plugin            = { workspace = true }
bmux_control_catalog_plugin_api = { workspace = true }
bmux_image                      = { workspace = true, optional = true }
bmux_ipc                        = { workspace = true }
bmux_plugin                     = { workspace = true }
bmux_session_models             = { workspace = true, features = ["serde"] }
bmux_sessions_plugin            = { workspace = true }
bmux_terminal_protocol          = { workspace = true }

# External dependencies
anyhow       = { workspace = true, features = ["std"] }
bmux_codec   = { workspace = true }
portable-pty = { workspace = true }
serde        = { workspace = true, features = ["derive"] }
serde_json   = { workspace = true, features = ["std"] }
thiserror    = { workspace = true }
tokio        = { workspace = true, features = ["macros", "net", "rt", "sync", "time"] }
tracing      = { workspace = true, features = ["std"] }
uuid         = { workspace = true, features = ["std", "v4"] }
vt100        = { workspace = true }


[features]
# Default features
default = []

# Development features
fail-on-warnings = [
    "bmux_clients_plugin/fail-on-warnings",
    "bmux_codec/fail-on-warnings",
    "bmux_config/fail-on-warnings",
    "bmux_contexts_plugin/fail-on-warnings",
    "bmux_image?/fail-on-warnings",
    "bmux_ipc/fail-on-warnings",
    "bmux_plugin/fail-on-warnings",
    "bmux_session_models/fail-on-warnings",
    "bmux_sessions_plugin/fail-on-warnings",
    "bmux_terminal_protocol/fail-on-warnings",
]

# Terminal image protocol support (feature-gated, optional)
image-registry = [
    "dep:bmux_image",
    "bmux_image/sixel",
    "bmux_image/kitty",
    "bmux_image/iterm2",
]

# IPC compression support
compression = ["bmux_ipc/compression"]

# Serialization features
serde = ["bmux_session_models/serde"]
