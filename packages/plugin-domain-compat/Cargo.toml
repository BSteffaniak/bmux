[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Opt-in domain-flavored convenience surface for bmux plugins"
edition     = { workspace = true }
keywords    = ["bmux", "plugin", "domain", "compat"]
license     = { workspace = true }
name        = "bmux_plugin_domain_compat"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_ipc        = { workspace = true }
bmux_plugin     = { workspace = true }
bmux_plugin_sdk = { workspace = true }
serde           = { workspace = true, features = ["derive", "std"] }
uuid            = { workspace = true, features = ["serde", "std"] }

[features]
default          = []
fail-on-warnings = []
