[package]
authors     = { workspace = true }
categories  = ["development-tools::procedural-macro-helpers"]
description = "Proc macro for including a BPDL schema and generating Rust bindings"
edition     = { workspace = true }
keywords    = ["bmux", "plugin", "bpdl", "proc-macro"]
license     = { workspace = true }
name        = "bmux_plugin_schema_macros"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[lib]
proc-macro = true

[dependencies]
bmux_plugin_schema = { workspace = true }
proc-macro2        = { workspace = true }
quote              = { workspace = true }
syn                = { workspace = true, features = ["full"] }

[dev-dependencies]
serde    = { workspace = true, features = ["derive", "std"] }
trybuild = { workspace = true }
uuid     = { workspace = true, features = ["v4", "serde"] }

# serde and uuid are consumed only by the trybuild-generated ephemeral
# fixture crate that compiles `tests/ui/**/*.rs`. cargo-machete can't
# see into that synthesized crate, so it flags both as unused in this
# package. They are genuinely needed for the pass fixtures to compile
# the serde-deriving BPDL-generated code.
[package.metadata.cargo-machete]
ignored = ["serde", "uuid"]

[features]
default          = []
fail-on-warnings = []
