[package]
authors     = { workspace = true }
categories  = ["development-tools::procedural-macro-helpers"]
description = "Proc macro for including a BPDL schema and generating Rust bindings"
edition     = { workspace = true }
keywords    = ["bmux", "plugin", "bpdl", "proc-macro"]
license     = { workspace = true }
name        = "bmux_plugin_schema_macros"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[lib]
proc-macro = true

[dependencies]
bmux_plugin_schema = { workspace = true }
proc-macro2        = { workspace = true }
quote              = { workspace = true }
syn                = { workspace = true, features = ["full"] }

[dev-dependencies]
bmux_plugin_sdk = { workspace = true }
serde           = { workspace = true, features = ["derive", "std"] }
trybuild        = { workspace = true }
uuid            = { workspace = true, features = ["v4", "serde"] }

# serde, uuid, and bmux_plugin_sdk are consumed only by the
# trybuild-generated ephemeral fixture crate that compiles
# `tests/ui/**/*.rs`. cargo-machete can't see into that synthesized
# crate, so it flags all three as unused in this package. They are
# genuinely needed for the pass fixtures to compile the
# serde-deriving BPDL-generated code, which references
# `::bmux_plugin_sdk::InterfaceId` in emitted constants.
[package.metadata.cargo-machete]
ignored = ["serde", "uuid", "bmux_plugin_sdk"]

[features]
default          = []
fail-on-warnings = []
