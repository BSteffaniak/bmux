[package]
authors     = { workspace = true }
categories  = ["command-line-utilities", "development-tools"]
description = "Command-line interface for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "cli", "multiplexer", "terminal"]
license     = { workspace = true }
name        = "bmux_cli"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[[bin]]
name = "bmux"
path = "src/main.rs"

[dependencies]
# Internal bmux packages
bmux_cli_output        = { workspace = true }
bmux_cli_schema        = { workspace = true }
bmux_client            = { workspace = true }
bmux_config            = { workspace = true }
bmux_event             = { workspace = true }
bmux_fonts             = { workspace = true, default-features = false }
bmux_ipc               = { workspace = true }
bmux_keybind           = { workspace = true }
bmux_keyboard          = { workspace = true }
bmux_plugin            = { workspace = true }
bmux_plugin_sdk        = { workspace = true }
bmux_server            = { workspace = true }
bmux_session           = { workspace = true }
bmux_terminal          = { workspace = true }
bmux_terminal_protocol = { workspace = true }

# Bundled plugins (optional, statically linked as rlib when enabled)
bmux_clipboard_plugin = { workspace = true, optional = true, features = [
    "static-bundled",
] }
bmux_permissions_plugin = { workspace = true, optional = true, features = [
    "static-bundled",
] }
bmux_plugin_cli_plugin = { workspace = true, optional = true, features = [
    "static-bundled",
] }
bmux_prompted_actions_plugin = { workspace = true, optional = true, features = [
    "static-bundled",
] }
bmux_windows_plugin = { workspace = true, optional = true, features = [
    "static-bundled",
] }

# Image protocol support (optional, feature-gated per protocol)
ab_glyph = { workspace = true }
anyhow = { workspace = true, features = ["std"] }
bmux_image = { workspace = true, optional = true }
clap = { workspace = true, features = ["derive", "help", "std", "usage"] }
crossterm = { workspace = true, features = ["events", "event-stream"] }
dirs = { workspace = true }
font8x8 = { workspace = true }
fontdb = { workspace = true }
futures = { workspace = true }
gif = { workspace = true }
git_sshripped_recipient = { workspace = true }
git_sshripped_ssh_agent = { workspace = true }
git_sshripped_ssh_identity = { workspace = true }
image = { workspace = true, optional = true }
iroh = { workspace = true }
moosicbox_log_runtime = { workspace = true, features = ["file"] }
moosicbox_log_watch = { workspace = true, features = [
    "tui",
    "persistence-json",
] }
qrcode = { workspace = true }
rcgen = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true }
resvg = { workspace = true }
rustls = { workspace = true }
rustls-native-certs = { workspace = true }
rustls-pemfile = { workspace = true }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }
similar = { workspace = true }
time = { workspace = true, features = ["formatting", "parsing", "std"] }
tokio = { workspace = true, features = [
    "macros",
    "rt",
    "rt-multi-thread",
    "io-util",
    "net",
    "io-std",
    "process",
    "signal",
    "time",
] }
tokio-rustls = { workspace = true }
toml = { workspace = true }
toml_edit = { workspace = true }
tracing = { workspace = true, features = ["std"] }
ttf-parser = { workspace = true }
unicode-width = { workspace = true }
uuid = { workspace = true, features = ["std"] }
vt100 = { workspace = true }

[features]
# Default features
default = [
    "bundled-fonts",
    "bundled-plugins",
    "compression",
    "kitty-keyboard",
    "image-protocols",
]

# Development features
fail-on-warnings = [
    "bmux_cli_schema/fail-on-warnings",
    "bmux_cli_output/fail-on-warnings",
    "bmux_client/fail-on-warnings",
    "bmux_clipboard_plugin?/fail-on-warnings",
    "bmux_config/fail-on-warnings",
    "bmux_event/fail-on-warnings",
    "bmux_image?/fail-on-warnings",
    "bmux_ipc/fail-on-warnings",
    "bmux_keybind/fail-on-warnings",
    "bmux_keyboard/fail-on-warnings",
    "bmux_permissions_plugin?/fail-on-warnings",
    "bmux_plugin/fail-on-warnings",
    "bmux_plugin_cli_plugin?/fail-on-warnings",
    "bmux_plugin_sdk/fail-on-warnings",
    "bmux_prompted_actions_plugin?/fail-on-warnings",
    "bmux_server/fail-on-warnings",
    "bmux_session/fail-on-warnings",
    "bmux_terminal/fail-on-warnings",
    "bmux_terminal_protocol/fail-on-warnings",
    "bmux_windows_plugin?/fail-on-warnings",
]

# Kitty keyboard protocol support (CSI u encoding/decoding + inner program negotiation)
kitty-keyboard = [
    "bmux_keyboard/csi-u",
    "bmux_terminal_protocol/kitty-keyboard",
]

# Statically link all four bundled plugins into the binary
bundled-plugins = [
    "bundled-plugin-clipboard",
    "bundled-plugin-permissions",
    "bundled-plugin-cli",
    "bundled-plugin-prompted-actions",
    "bundled-plugin-windows",
]

# Individual plugin features for selective bundling
bundled-plugin-cli              = ["dep:bmux_plugin_cli_plugin"]
bundled-plugin-clipboard        = ["dep:bmux_clipboard_plugin"]
bundled-plugin-permissions      = ["dep:bmux_permissions_plugin"]
bundled-plugin-prompted-actions = ["dep:bmux_prompted_actions_plugin"]
bundled-plugin-windows          = ["dep:bmux_windows_plugin"]

# Optional features
bundled-fonts = ["bmux_fonts/bundled-fonts", "bmux_fonts/bundled-nerd-fonts"]

# IPC compression support
compression = ["bmux_ipc/compression", "bmux_server/compression"]

# Serialization features
serde = [
    "bmux_client/serde",
    "bmux_event/serde",
    "bmux_keyboard/serde",
    "bmux_server/serde",
    "bmux_session/serde",
    "bmux_terminal/serde",
]

# Terminal image protocol support
image-iterm2 = [
    "dep:bmux_image",
    "dep:image",
    "bmux_image/iterm2",
    "bmux_server/image-registry",
]
image-kitty = [
    "dep:bmux_image",
    "dep:image",
    "bmux_image/kitty",
    "bmux_server/image-registry",
]
image-protocols = ["image-sixel", "image-kitty", "image-iterm2"]
image-sixel = [
    "dep:bmux_image",
    "bmux_image/sixel",
    "bmux_server/image-registry",
]

[dev-dependencies]
serde_json  = { workspace = true }
serial_test = { workspace = true }
