[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Fuzzy search functionality for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "fuzzy", "search", "terminal"]
license     = { workspace = true }
name        = "bmux_search"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_history  = { workspace = true }
bmux_session  = { workspace = true }
bmux_terminal = { workspace = true }

# External dependencies
anyhow             = { workspace = true }
serde              = { workspace = true, features = ["derive"], optional = true }
thiserror          = { workspace = true }
tracing-subscriber = { workspace = true, optional = true }


[features]
# Default features
default = ["logging"]

# Development features
fail-on-warnings = []

# Optional features
logging = ["dep:tracing-subscriber"]

# Serialization features
serde = ["bmux_history/serde", "bmux_session/serde", "bmux_terminal/serde", "dep:serde"]
