[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Key types and keyboard protocol encoding/decoding for bmux"
edition     = { workspace = true }
keywords    = ["bmux", "keyboard", "kitty", "protocol", "terminal"]
license     = { workspace = true }
name        = "bmux_keyboard"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
serde = { workspace = true, features = ["derive", "std"], optional = true }

[features]
csi-u            = []
default          = ["csi-u"]
fail-on-warnings = []
serde            = ["dep:serde"]
