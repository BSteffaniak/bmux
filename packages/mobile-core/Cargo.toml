[package]
authors     = { workspace = true }
categories  = ["network-programming", "development-tools"]
description = "Shared mobile domain core for bmux clients"
edition     = { workspace = true }
keywords    = ["bmux", "mobile", "connection", "ffi"]
license     = { workspace = true }
name        = "bmux_mobile_core"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_attach_pipeline = { workspace = true }
bmux_client = { workspace = true }
bmux_codec = { workspace = true }
bmux_ipc = { workspace = true, features = ["compression-zstd"] }
bmux_sessions_plugin_api = { workspace = true }
bmux_windows_plugin_api = { workspace = true }
iroh = { workspace = true }
rustls = { workspace = true }
rustls-native-certs = { workspace = true }
serde = { workspace = true, features = ["derive"] }
ssh2 = { workspace = true, features = ["vendored-openssl"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
    "io-util",
    "rt-multi-thread",
    "sync",
    "time",
] }
tokio-rustls = { workspace = true }
url = { version = "2.5.8", default-features = false }
uuid = { workspace = true, features = ["serde", "v4"] }

[features]
default = []

fail-on-warnings = []
