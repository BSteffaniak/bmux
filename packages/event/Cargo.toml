[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Event system for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "event", "system", "terminal"]
license     = { workspace = true }
name        = "bmux_event"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_event_models = { workspace = true }
bmux_session      = { workspace = true }

# External dependencies
anyhow    = { workspace = true, features = ["std"] }
serde     = { workspace = true, features = ["derive"], optional = true }
thiserror = { workspace = true }
tokio     = { workspace = true, features = ["sync"] }
tracing   = { workspace = true, features = ["std"] }


[features]
# Default features
default = ["serde"]

# Development features
fail-on-warnings = [
    "bmux_event_models/fail-on-warnings",
    "bmux_session/fail-on-warnings",
]

# Serialization features
serde = ["bmux_event_models/serde", "bmux_session/serde", "dep:serde"]
