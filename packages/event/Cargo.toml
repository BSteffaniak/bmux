[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Event system for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["bmux", "event", "system", "terminal"]
license     = { workspace = true }
name        = "bmux_event"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
# Internal bmux packages
bmux_event_models = { workspace = true }


[features]
# Default features
default = ["serde"]

# Development features
fail-on-warnings = ["bmux_event_models/fail-on-warnings"]

# Serialization features
serde = ["bmux_event_models/serde"]
