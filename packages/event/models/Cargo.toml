[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Event models for bmux terminal multiplexer"
edition     = { workspace = true }
keywords    = ["events", "input", "models", "multiplexer", "terminal"]
license     = { workspace = true }
name        = "bmux_event_models"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_keyboard        = { workspace = true, optional = true }
bmux_session_models  = { workspace = true }
bmux_terminal_models = { workspace = true }
serde                = { workspace = true, features = ["derive"], optional = true }


[features]
# Default features
default = ["serde"]

# Development features
fail-on-warnings = [
    "bmux_keyboard?/fail-on-warnings",
    "bmux_session_models/fail-on-warnings",
    "bmux_terminal_models/fail-on-warnings",
]

# Serialization features
keyboard = ["dep:bmux_keyboard"]
serde = [
    "bmux_keyboard?/serde",
    "bmux_session_models/serde",
    "bmux_terminal_models/serde",
    "dep:serde",
]
