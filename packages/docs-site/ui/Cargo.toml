[package]
authors     = { workspace = true }
categories  = ["web-programming"]
description = "bmux documentation website UI components"
edition     = { workspace = true }
keywords    = ["bmux", "documentation", "ui"]
license     = { workspace = true }
name        = "bmux_docs_site_ui"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_cli_schema = { workspace = true }
bmux_config     = { workspace = true }
bmux_config_doc = { workspace = true }

clap = { workspace = true, features = ["derive", "help", "std", "usage"] }

hyperchad = { workspace = true, features = [
    "actions",
    "actions-logic",
    "actions-serde",
    "color",
    "markdown",
    "markdown-syntax-highlighting",
    "markdown-xss-protection",
    "renderer",
    "router",
    "template",
    "transformer",
    "transformer-models",
] }

# These are needed as direct dependencies because the `container!` proc macro
# generates code with absolute paths like `::hyperchad_template::Container`.
hyperchad_color              = { workspace = true }
hyperchad_renderer           = { workspace = true }
hyperchad_template           = { workspace = true }
hyperchad_transformer        = { workspace = true }
hyperchad_transformer_models = { workspace = true }

[features]
fail-on-warnings = [
    "bmux_cli_schema/fail-on-warnings",
    "bmux_config/fail-on-warnings",
]

[dev-dependencies]
bmux_cli   = { workspace = true }
serde      = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml       = { workspace = true, features = ["parse"] }

[package.metadata.cargo-machete]
ignored = [
    "bmux_config_doc",              # Used via ConfigDocSchema trait derives in bmux_config types
    "hyperchad_renderer",           # Proc macro (container!) generates absolute ::hyperchad_renderer paths
    "hyperchad_transformer",        # Proc macro (container!) generates absolute ::hyperchad_transformer paths
    "hyperchad_transformer_models", # Proc macro (container!) generates absolute ::hyperchad_transformer_models paths
]
