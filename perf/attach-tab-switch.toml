[benchmark]
name = "attach-tab-switch"
kind = "attach-tab-switch"

[defaults]
iterations = 30
warmup = 5
windows = 4
switches = 4
scenario = "next-window"
attach_command_execution = "production"
attach_command_limit_ms = 8
retarget_limit_ms = 8

[profiles.normal]
tags = ["navigation", "production"]

[profiles.diagnostic]
tags = ["navigation", "production", "ipc"]
service_timing = false
ipc_timing = true
storage_timing = false
loosen_slo = true

[profiles.direct-service]
tags = ["navigation", "direct-service"]
attach_command_execution = "direct-window-service"

[profiles.ci]
tags = ["navigation"]

[profiles.stress]
tags = ["navigation"]
loosen_slo = true

[limit]
attach_command = 8
retarget = 8

[[reports]]
phase = "attach.plugin_command"
field = "total_us"
limit = "attach_command"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.plugin_command"
field = "before_context_us"
limit = "attach_command"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.plugin_command"
field = "run_us"
limit = "attach_command"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.plugin_command_pipeline"
field = "total_us"
limit = "attach_command"
tags = ["production"]
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.plugin_command"
field = "retarget_us"
limit = "retarget"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.window_cycle"
field = "invoke_us"
limit = "attach_command"
tags = ["direct-service"]
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.retarget_context"
field = "total_us"
limit = "retarget"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.retarget_context"
field = "retarget_service_us"
limit = "retarget"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.retarget_context"
field = "grant_us"
limit = "retarget"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.retarget_context"
field = "open_us"
limit = "retarget"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
phase = "attach.retarget_context"
field = "viewport_us"
limit = "retarget"
filter = { key = "command_name", value = "${command_name}" }
skip_first_per_sample = 1

[[reports]]
