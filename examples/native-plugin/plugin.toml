entry = "libbmux_example_native_plugin.dylib"
id = "example.native"
name = "Example Native Plugin"
provided_features = ["example.native"]
required_capabilities = [
    "bmux.commands",
    "bmux.config.read",
    "bmux.events.subscribe",
    "bmux.permissions.read",
    "bmux.permissions.write",
    "bmux.windows.read",
    "bmux.windows.write",
]
runtime = "native"
version = "0.0.1-alpha.0"

[[commands]]
execution     = "provider_exec"
expose_in_cli = true
name          = "hello"
summary       = "Print a hello message"

[[commands.arguments]]
allow_hyphen_values = true
kind                = "string"
multiple            = true
name                = "message"
position            = 0
summary             = "Optional greeting target"
trailing_var_arg    = true
value_name          = "MESSAGE"

[[commands]]
execution     = "provider_exec"
expose_in_cli = true
name          = "permissions-list"
summary       = "List session permissions through bmux provider service"

[[commands.arguments]]
kind       = "string"
name       = "session"
position   = 0
required   = true
summary    = "Session name or UUID"
value_name = "SESSION"

[[commands]]
execution     = "provider_exec"
expose_in_cli = true
name          = "permissions-grant"
summary       = "Grant a role through bmux provider service"

[[commands.arguments]]
kind       = "string"
name       = "session"
position   = 0
required   = true
summary    = "Session name or UUID"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "client"
name       = "client"
required   = true
short      = "c"
summary    = "Client UUID"
value_name = "CLIENT"

[[commands.arguments]]
kind       = "choice"
long       = "role"
name       = "role"
required   = true
short      = "r"
summary    = "Role to grant"
value_name = "ROLE"
values     = ["owner", "writer", "observer"]

[[commands]]
execution     = "provider_exec"
expose_in_cli = true
name          = "permissions-revoke"
summary       = "Revoke a role through bmux provider service"

[[commands.arguments]]
kind       = "string"
name       = "session"
position   = 0
required   = true
summary    = "Session name or UUID"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "client"
name       = "client"
required   = true
short      = "c"
summary    = "Client UUID"
value_name = "CLIENT"

[[commands]]
execution     = "provider_exec"
expose_in_cli = true
name          = "windows-list"
summary       = "List session windows through bmux provider service"

[[commands.arguments]]
kind       = "string"
name       = "session"
position   = 0
required   = true
summary    = "Session name or UUID"
value_name = "SESSION"

[[commands]]
execution     = "provider_exec"
expose_in_cli = true
name          = "windows-new"
summary       = "Create a session window through bmux provider service"

[[commands.arguments]]
kind       = "string"
name       = "session"
position   = 0
required   = true
summary    = "Session name or UUID"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "name"
name       = "name"
short      = "n"
summary    = "Optional window name"
value_name = "NAME"

[[commands]]
execution     = "provider_exec"
expose_in_cli = true
name          = "settings-show"
summary       = "Show plugin settings through bmux config service"

[[event_subscriptions]]
kinds = ["system", "window"]
names = ["server_started", "window_created"]

[[dependencies]]
plugin_id   = "bmux.permissions"
version_req = "=0.0.1-alpha.0"

[[dependencies]]
plugin_id   = "bmux.windows"
version_req = "=0.0.1-alpha.0"

[plugin_api]
minimum = "1.0"

[native_abi]
minimum = "1.0"
