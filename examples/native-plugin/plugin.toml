entry = "libbmux_example_native_plugin.dylib"
id = "example.native"
name = "Example Native Plugin"
provided_features = ["example.native"]
required_host_scopes = [
    "bmux.commands",
    "bmux.events.subscribe",
    "bmux.permissions.read",
]
runtime = "native"
version = "0.0.1-alpha.0"

[[commands]]
execution = "host_callback"
name      = "hello"
summary   = "Print a hello message"

[[commands.arguments]]
allow_hyphen_values = true
kind                = "string"
multiple            = true
name                = "message"
position            = 0
summary             = "Optional greeting target"
trailing_var_arg    = true
value_name          = "MESSAGE"

[[commands]]
execution = "host_callback"
name      = "permissions-list"
summary   = "List session permissions through bmux host IPC"

[[commands.arguments]]
kind       = "string"
name       = "session"
position   = 0
required   = true
summary    = "Session name or UUID"
value_name = "SESSION"

[[event_subscriptions]]
kinds = ["system", "window"]
names = ["server_started", "window_created"]

[plugin_api]
minimum = "1.0"

[native_abi]
minimum = "1.0"
