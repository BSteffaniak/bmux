execution_class = "native_fast"
id = "bmux.plugin_cli"
name = "bmux Plugin CLI"
owns_namespaces = ["plugin"]
owns_paths = [
    [
        "logs",
        "path",
    ],
    [
        "logs",
        "level",
    ],
    [
        "logs",
        "tail",
    ],
    [
        "logs",
        "watch",
    ],
    [
        "logs",
        "profiles",
        "list",
    ],
    [
        "logs",
        "profiles",
        "show",
    ],
    [
        "logs",
        "profiles",
        "delete",
    ],
    [
        "logs",
        "profiles",
        "rename",
    ],
    [
        "keymap",
        "doctor",
    ],
    [
        "terminal",
        "doctor",
    ],
    [
        "terminal",
        "install-terminfo",
    ],
    [
        "recording",
        "start",
    ],
    [
        "recording",
        "stop",
    ],
    [
        "recording",
        "status",
    ],
    [
        "recording",
        "path",
    ],
    [
        "recording",
        "list",
    ],
    [
        "recording",
        "delete",
    ],
    [
        "recording",
        "delete-all",
    ],
    [
        "recording",
        "cut",
    ],
    [
        "recording",
        "inspect",
    ],
    [
        "recording",
        "replay",
    ],
    [
        "recording",
        "verify-smoke",
    ],
    [
        "recording",
        "export",
    ],
    [
        "recording",
        "prune",
    ],
    [
        "playbook",
        "run",
    ],
    [
        "playbook",
        "validate",
    ],
    [
        "playbook",
        "interactive",
    ],
    [
        "playbook",
        "from-recording",
    ],
    [
        "playbook",
        "dry-run",
    ],
    [
        "playbook",
        "diff",
    ],
    [
        "playbook",
        "cleanup",
    ],
]
required_capabilities = ["bmux.commands"]
version = "0.0.1-alpha.0"

[[commands]]
expose_in_cli = true
name          = "list"
path          = ["plugin", "list"]
summary       = "List discovered plugins"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands]]
expose_in_cli = true
name          = "run"
path          = ["plugin", "run"]
summary       = "Run a declared plugin command"

[[commands.arguments]]
kind       = "string"
name       = "plugin"
position   = 0
required   = true
value_name = "PLUGIN"

[[commands.arguments]]
kind       = "string"
name       = "command"
position   = 1
required   = true
value_name = "COMMAND"

[[commands.arguments]]
allow_hyphen_values = true
kind                = "string"
multiple            = true
name                = "args"
position            = 2
trailing_var_arg    = true
value_name          = "ARGS"

[[commands]]
expose_in_cli = true
name          = "rebuild"
path          = ["plugin", "rebuild"]
summary       = "Rebuild bundled plugin crates"

[[commands.arguments]]
kind = "boolean"
long = "release"
name = "release"

[[commands.arguments]]
kind = "boolean"
long = "list"
name = "list"

[[commands.arguments]]
kind = "boolean"
long = "json"
name = "json"

[[commands.arguments]]
kind = "boolean"
long = "changed"
name = "changed"

[[commands.arguments]]
kind = "boolean"
long = "merge-base"
name = "merge-base"

[[commands.arguments]]
kind = "boolean"
long = "dry-run"
name = "dry-run"

[[commands.arguments]]
kind = "boolean"
long = "against-master"
name = "against-master"

[[commands.arguments]]
kind       = "string"
long       = "base"
name       = "base"
value_name = "REF"

[[commands.arguments]]
kind = "boolean"
long = "all-workspace-plugins"
name = "all-workspace-plugins"

[[commands.arguments]]
allow_hyphen_values = true
kind                = "string"
multiple            = true
name                = "selectors"
position            = 0
value_name          = "SELECTOR"

[[commands]]
expose_in_cli = true
name          = "doctor"
path          = ["plugin", "doctor"]
summary       = "Validate plugin configuration and readiness"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands.arguments]]
kind = "boolean"
long = "strict"
name = "strict"

