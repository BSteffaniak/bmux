entry = "libbmux_permissions_plugin.dylib"
id = "bmux.permissions"
name = "bmux Permissions"
provided_capabilities = [
    "bmux.permissions.read",
    "bmux.permissions.write",
    "bmux.sessions.policy",
]
provided_features = ["bmux.permissions"]
required_capabilities = ["bmux.commands"]
runtime = "native"
version = "0.0.1-alpha.0"

[[services]]
capability   = "bmux.permissions.read"
interface_id = "permission-query/v1"
kind         = "query"

[[services]]
capability   = "bmux.permissions.write"
interface_id = "permission-command/v1"
kind         = "command"

[[services]]
capability   = "bmux.sessions.policy"
interface_id = "session-policy-query/v1"
kind         = "query"

[[commands]]
aliases       = [["session", "permissions"]]
execution     = "provider_exec"
expose_in_cli = true
name          = "permissions"
path          = ["permissions"]
summary       = "List explicit role assignments for a session"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
required   = true
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands.arguments]]
kind  = "boolean"
long  = "watch"
name  = "watch"
short = "w"

[[commands]]
aliases       = [["session", "grant"]]
execution     = "provider_exec"
expose_in_cli = true
name          = "grant"
path          = ["grant"]
summary       = "Grant a role to a client in a session"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
required   = true
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "client"
name       = "client"
required   = true
short      = "c"
value_name = "CLIENT"

[[commands.arguments]]
kind       = "choice"
long       = "role"
name       = "role"
required   = true
short      = "r"
value_name = "ROLE"
values     = ["owner", "writer", "observer"]

[[commands]]
aliases       = [["session", "revoke"]]
execution     = "provider_exec"
expose_in_cli = true
name          = "revoke"
path          = ["revoke"]
summary       = "Revoke an explicit role from a client in a session"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
required   = true
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "client"
name       = "client"
required   = true
short      = "c"
value_name = "CLIENT"

[plugin_api]
minimum = "1.0"

[native_abi]
minimum = "1.0"
