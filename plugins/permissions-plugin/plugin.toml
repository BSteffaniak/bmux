execution_class = "native_fast"
id = "bmux.permissions"
name = "bmux Permissions"
provided_capabilities = [
    "bmux.permissions.read",
    "bmux.permissions.write",
    "bmux.sessions.policy",
]
provided_features = ["bmux.permissions"]
required_capabilities = [
    "bmux.commands",
    "bmux.sessions.read",
    "bmux.clients.read",
    "bmux.storage",
]
version = "0.0.1-alpha.0"

[[services]]
capability   = "bmux.permissions.read"
interface_id = "permission-query/v1"
kind         = "query"

[[services]]
capability   = "bmux.permissions.write"
interface_id = "permission-command/v1"
kind         = "command"

[[services]]
capability   = "bmux.sessions.policy"
interface_id = "session-policy-query/v1"
kind         = "query"

[[services]]
capability   = "bmux.sessions.policy"
interface_id = "session-policy-command/v1"
kind         = "command"

[[commands]]
aliases       = [["session", "permissions"]]
expose_in_cli = true
name          = "permissions"
path          = ["permissions"]
summary       = "Permissions provider status"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
required   = true
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands]]
aliases       = [["session", "hot-path-policy"]]
expose_in_cli = true
name          = "hot-path-policy"
path          = ["hot-path-policy"]
summary       = "Inspect effective hot-path policy decision"

[[commands.arguments]]
kind       = "string"
long       = "plugin"
name       = "plugin"
required   = true
value_name = "PLUGIN"

[[commands.arguments]]
kind       = "string"
long       = "capability"
name       = "capability"
required   = true
value_name = "CAPABILITY"

[[commands.arguments]]
kind       = "choice"
long       = "execution-class"
name       = "execution-class"
required   = true
value_name = "EXECUTION_CLASS"
values     = ["native_fast", "native_standard", "interpreter"]

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "context"
name       = "context"
value_name = "CONTEXT"

[[commands.arguments]]
kind = "boolean"
long = "watch"
name = "watch"

[[commands.arguments]]
kind       = "integer"
long       = "interval-ms"
name       = "interval-ms"
value_name = "INTERVAL_MS"

[[commands.arguments]]
kind       = "integer"
long       = "iterations"
name       = "iterations"
value_name = "ITERATIONS"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands]]
aliases       = [["session", "permissions-current"]]
expose_in_cli = true
name          = "permissions-current"
path          = ["permissions-current"]
summary       = "Permissions for the currently active session"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands]]
aliases       = [["session", "grant"]]
expose_in_cli = true
name          = "grant"
path          = ["grant"]
summary       = "Grant command handled by permissions provider"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
required   = true
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "client"
name       = "client"
required   = true
short      = "c"
value_name = "CLIENT"

[[commands.arguments]]
kind       = "choice"
long       = "role"
name       = "role"
required   = true
short      = "r"
value_name = "ROLE"
values     = ["owner", "writer", "observer"]

[[commands]]
aliases       = [["session", "revoke"]]
expose_in_cli = true
name          = "revoke"
path          = ["revoke"]
summary       = "Revoke command handled by permissions provider"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
required   = true
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "client"
name       = "client"
required   = true
short      = "c"
value_name = "CLIENT"

[keybindings.runtime]
"shift+p" = "plugin:bmux.permissions:permissions-current"

[[commands]]
aliases       = [["session", "grant-hot-path-override"]]
expose_in_cli = true
name          = "grant-hot-path-override"
path          = ["grant-hot-path-override"]
summary       = "Grant scoped hot-path override"

[[commands.arguments]]
kind       = "string"
long       = "plugin"
name       = "plugin"
required   = true
value_name = "PLUGIN"

[[commands.arguments]]
kind       = "string"
long       = "capability"
name       = "capability"
required   = true
value_name = "CAPABILITY"

[[commands.arguments]]
kind       = "choice"
long       = "execution-class"
name       = "execution-class"
required   = true
value_name = "EXECUTION_CLASS"
values     = ["native_standard", "interpreter"]

[[commands.arguments]]
kind       = "choice"
long       = "scope"
name       = "scope"
required   = true
value_name = "SCOPE"
values     = ["global", "session", "context", "session_context"]

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "context"
name       = "context"
value_name = "CONTEXT"

[[commands]]
aliases       = [["session", "revoke-hot-path-override"]]
expose_in_cli = true
name          = "revoke-hot-path-override"
path          = ["revoke-hot-path-override"]
summary       = "Revoke scoped hot-path override"

[[commands.arguments]]
kind       = "string"
long       = "plugin"
name       = "plugin"
required   = true
value_name = "PLUGIN"

[[commands.arguments]]
kind       = "string"
long       = "capability"
name       = "capability"
required   = true
value_name = "CAPABILITY"

[[commands.arguments]]
kind       = "choice"
long       = "execution-class"
name       = "execution-class"
required   = true
value_name = "EXECUTION_CLASS"
values     = ["native_standard", "interpreter"]

[[commands.arguments]]
kind       = "choice"
long       = "scope"
name       = "scope"
required   = true
value_name = "SCOPE"
values     = ["global", "session", "context", "session_context"]

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "context"
name       = "context"
value_name = "CONTEXT"

[[commands]]
aliases       = [["session", "list-hot-path-overrides"]]
expose_in_cli = true
name          = "list-hot-path-overrides"
path          = ["list-hot-path-overrides"]
summary       = "List scoped hot-path overrides"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "context"
name       = "context"
value_name = "CONTEXT"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"
