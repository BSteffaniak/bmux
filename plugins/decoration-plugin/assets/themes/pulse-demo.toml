# Pulse-demo theme — showcases the decoration plugin's Lua scripting
# surface. The focused pane's border breathes between lime-green and
# cyan every two seconds; unfocused panes get a static dim border.
#
# Select via `appearance.theme = "pulse-demo"` in bmux.toml. This
# theme is bundled into the decoration plugin (see
# `bundled_theme_presets()`), so it works without copying anything
# to ~/.config/bmux/themes/.

background           = "#000000"
cursor               = "#39ff14"
foreground           = "#e6ffe6"
name                 = "pulse-demo"
selection_background = "#003311"

[border]
active   = "#39ff14"
inactive = "#1a4d1a"

[status]
active_window  = "#39ff14"
background     = "#000000"
foreground     = "#cfffcf"
mode_indicator = "#ffd700"

# Decoration plugin extension. `script` points at the bundled `pulse`
# script (see plugins/decoration-plugin/assets/decorations/pulse.lua);
# the bare name `"pulse"` resolves against the bundled script list
# without any filesystem setup.
[plugins."bmux.decoration"]
script = "pulse"

[plugins."bmux.decoration".unfocused]
bg            = ""
fg            = "#1a4d1a"
glyphs_custom = []
gradient_from = ""
gradient_to   = ""
style         = "single-line"

[plugins."bmux.decoration".focused]
bg            = ""
fg            = "#39ff14"
glyphs_custom = []
gradient_from = ""
gradient_to   = ""
style         = "thick"

[plugins."bmux.decoration".zoomed]
bg            = ""
fg            = "#ffd700"
glyphs_custom = []
gradient_from = ""
gradient_to   = ""
style         = "double"

[plugins."bmux.decoration".badges]
exited  = "✗"
running = "▶"

[plugins."bmux.decoration".animation]
hz   = 30
kind = "pulse"
