# Cyberpunk theme — magenta + cyan neon.

background           = "#0a001a"
cursor               = "#00ffff"
foreground           = "#ff00aa"
name                 = "cyberpunk"
selection_background = "#2a1044"

[border]
active   = "#ff00aa"
inactive = "#4a0066"

[status]
active_window  = "#00ffff"
background     = "#0a001a"
foreground     = "#ff00aa"
mode_indicator = "#ffd700"

[plugins."bmux.decoration"]

[plugins."bmux.decoration".unfocused]
bg            = ""
fg            = "#4a0066"
glyphs_custom = []
gradient_from = ""
gradient_to   = ""
style         = "rounded"

[plugins."bmux.decoration".focused]
bg            = ""
fg            = "#ff00aa"
glyphs_custom = []
gradient_from = "#ff00aa"
gradient_to   = "#00ffff"
style         = "thick"

[plugins."bmux.decoration".zoomed]
bg            = ""
fg            = "#ffd700"
glyphs_custom = []
gradient_from = ""
gradient_to   = ""
style         = "heavy-double"

[plugins."bmux.decoration".badges]
exited  = "◇"
running = "◆"
