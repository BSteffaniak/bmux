execution_class = "native_fast"
id = "bmux.windows"
name = "bmux Windows"
owns_namespaces = [
    "window",
    "new-window",
    "list-windows",
    "kill-window",
    "kill-all-windows",
    "switch-window",
    "next-window",
    "prev-window",
    "last-window",
    "goto-window",
    "close-current-window",
]
provided_capabilities = ["bmux.windows.read", "bmux.windows.write"]
provided_features = ["bmux.windows"]
required_capabilities = [
    "bmux.commands",
    "bmux.contexts.read",
    "bmux.contexts.write",
    "bmux.clients.read",
    "bmux.panes.read",
    "bmux.panes.write",
    "bmux.storage",
]
version = "0.0.1-alpha.0"

[[services]]
capability   = "bmux.windows.read"
interface_id = "windows-state"
kind         = "query"

[[services]]
capability   = "bmux.windows.write"
interface_id = "windows-commands"
kind         = "command"

[[services]]
capability   = "bmux.windows.read"
interface_id = "windows-events"
kind         = "event"

[[commands]]
aliases       = [["window", "new"]]
expose_in_cli = true
name          = "new-window"
path          = ["new-window"]
summary       = "Create a workspace window"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "name"
name       = "name"
short      = "n"
value_name = "NAME"

[[commands]]
aliases       = [["window", "list"]]
expose_in_cli = true
name          = "list-windows"
path          = ["list-windows"]
summary       = "List workspace windows"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands]]
aliases       = [["window", "kill"]]
expose_in_cli = true
name          = "kill-window"
path          = ["kill-window"]
summary       = "Kill a workspace window"

[[commands.arguments]]
kind       = "string"
name       = "target"
position   = 0
required   = true
value_name = "TARGET"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind = "boolean"
long = "force-local"
name = "force-local"

[[commands]]
aliases       = [["window", "kill-all"]]
expose_in_cli = true
name          = "kill-all-windows"
path          = ["kill-all-windows"]
summary       = "Kill all workspace windows"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind = "boolean"
long = "force-local"
name = "force-local"

[[commands]]
aliases       = [["window", "switch"]]
expose_in_cli = true
name          = "switch-window"
path          = ["switch-window"]
summary       = "Switch active workspace window"

[[commands.arguments]]
kind       = "string"
name       = "target"
position   = 0
required   = true
value_name = "TARGET"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands]]
aliases       = [["window", "next"]]
expose_in_cli = true
name          = "next-window"
path          = ["next-window"]
summary       = "Switch to the next workspace window"

[[commands]]
aliases       = [["window", "prev"]]
expose_in_cli = true
name          = "prev-window"
path          = ["prev-window"]
summary       = "Switch to the previous workspace window"

[[commands]]
aliases       = [["window", "last"]]
expose_in_cli = true
name          = "last-window"
path          = ["last-window"]
summary       = "Switch to the previously active workspace window"

[[commands]]
aliases       = [["window", "goto"]]
expose_in_cli = true
name          = "goto-window"
path          = ["goto-window"]
summary       = "Switch to a workspace window by 1-based index"

[[commands.arguments]]
kind       = "string"
name       = "index"
position   = 0
required   = true
value_name = "INDEX"

[[commands]]
aliases       = [["window", "close-current"]]
expose_in_cli = true
name          = "close-current-window"
path          = ["close-current-window"]
summary       = "Close the current workspace window"

[keybindings.runtime]
c = "plugin:bmux.windows:new-window"
n = "plugin:bmux.windows:next-window"
p = "plugin:bmux.windows:prev-window"
w = "plugin:bmux.windows:last-window"
