entry = "libbmux_windows_plugin.dylib"
id = "bmux.windows"
name = "bmux Windows"
provided_features = ["bmux.windows"]
required_host_scopes = [
    "bmux.commands",
    "bmux.sessions.read",
    "bmux.windows.read",
    "bmux.windows.write",
]
runtime = "native"
version = "0.0.1-alpha.0"

[[commands]]
aliases       = [["window", "new"]]
execution     = "host_callback"
expose_in_cli = true
name          = "new-window"
path          = ["new-window"]
summary       = "Create a new window in a session"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind       = "string"
long       = "name"
name       = "name"
short      = "n"
value_name = "NAME"

[[commands]]
aliases       = [["window", "list"]]
execution     = "host_callback"
expose_in_cli = true
name          = "list-windows"
path          = ["list-windows"]
summary       = "List windows for a session"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind  = "boolean"
long  = "json"
name  = "json"
short = "j"

[[commands]]
aliases       = [["window", "kill"]]
execution     = "host_callback"
expose_in_cli = true
name          = "kill-window"
path          = ["kill-window"]
summary       = "Kill a window by name, UUID, or active"

[[commands.arguments]]
kind       = "string"
name       = "target"
position   = 0
required   = true
value_name = "TARGET"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind = "boolean"
long = "force-local"
name = "force-local"

[[commands]]
aliases       = [["window", "kill-all"]]
execution     = "host_callback"
expose_in_cli = true
name          = "kill-all-windows"
path          = ["kill-all-windows"]
summary       = "Kill all windows in a session"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[[commands.arguments]]
kind = "boolean"
long = "force-local"
name = "force-local"

[[commands]]
aliases       = [["window", "switch"]]
execution     = "host_callback"
expose_in_cli = true
name          = "switch-window"
path          = ["switch-window"]
summary       = "Switch active window by name, UUID, or active"

[[commands.arguments]]
kind       = "string"
name       = "target"
position   = 0
required   = true
value_name = "TARGET"

[[commands.arguments]]
kind       = "string"
long       = "session"
name       = "session"
short      = "s"
value_name = "SESSION"

[plugin_api]
minimum = "1.0"

[native_abi]
minimum = "1.0"
