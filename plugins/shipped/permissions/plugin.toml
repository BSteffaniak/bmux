entry = "libbmux_permissions_plugin.dylib"
id = "bmux.permissions"
name = "bmux Permissions"
provided_features = ["bmux.permissions"]
required_host_scopes = [
    "bmux.commands",
    "bmux.permissions.read",
    "bmux.permissions.write",
]
runtime = "native"
version = "0.0.1-alpha.0"

[[commands]]
aliases       = [["session", "permissions"]]
execution     = "host_callback"
expose_in_cli = true
name          = "permissions"
path          = ["permissions"]
summary       = "List explicit role assignments for a session"

[[commands]]
aliases       = [["session", "grant"]]
execution     = "host_callback"
expose_in_cli = true
name          = "grant"
path          = ["grant"]
summary       = "Grant a role to a client in a session"

[[commands]]
aliases       = [["session", "revoke"]]
execution     = "host_callback"
expose_in_cli = true
name          = "revoke"
path          = ["revoke"]
summary       = "Revoke an explicit role from a client in a session"

[plugin_api]
minimum = "1.0"

[native_abi]
minimum = "1.0"
