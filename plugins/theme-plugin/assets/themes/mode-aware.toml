# Mode-aware theme layer - highlights modal/runtime states without changing the base theme.

name = "mode-aware"

[status]
mode_indicator = "#ffd75f"

[modes.normal.status]
background     = "#2a1616"
mode_indicator = "#ff5f5f"

[modes.normal.content_effects.default_bg_wash]
background_blend = { color = "#ff5f5f", amount = 0.16 }
enabled          = true
scope            = "cells"
when_bg          = "default"

[modes.insert.status]
mode_indicator = "#5fff87"

[modes.visual.status]
mode_indicator = "#af87ff"

[modes.command.status]
mode_indicator = "#ffd75f"

[modes.scroll.status]
mode_indicator = "#5fffff"

[modes.help.status]
mode_indicator = "#87afff"

[modes.prompt.status]
mode_indicator = "#ffaf5f"

[modes.zoom.status]
mode_indicator = "#ff87d7"
