execution_class       = "native_fast"
id                    = "bmux.clipboard"
name                  = "bmux Clipboard"
provided_capabilities = ["bmux.clipboard.write"]
provided_features     = ["bmux.clipboard"]
version               = "0.0.1-alpha.0"

[[services]]
capability   = "bmux.clipboard.write"
interface_id = "clipboard-write/v1"
kind         = "command"

[keybindings.runtime]
y = "copy_scrollback"

[keybindings.scroll]
y = "copy_scrollback"
