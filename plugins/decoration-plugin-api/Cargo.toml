[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Typed public API of the bmux decoration plugin (BPDL-generated bindings)"
edition     = { workspace = true }
keywords    = ["bmux", "plugin", "api", "decoration"]
license     = { workspace = true }
name        = "bmux_decoration_plugin_api"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
bmux_codec                = { workspace = true }
bmux_ipc                  = { workspace = true }
bmux_plugin_schema_macros = { workspace = true }
bmux_plugin_sdk           = { workspace = true }
bmux_scene_protocol       = { workspace = true }
serde                     = { workspace = true, features = ["derive", "std"] }
thiserror                 = { workspace = true }
uuid                      = { workspace = true, features = ["serde", "std"] }

[dev-dependencies]
serde_json = { workspace = true }

[package.metadata.cargo-machete]
# `serde` is consumed by code generated from the BPDL schema via the
# `bmux_plugin_schema_macros::schema!` proc macro; cargo-machete cannot
# see into proc-macro-generated source.
# `bmux_plugin_sdk` is referenced by generated code for the typed
# `INTERFACE_ID` / `EVENT_KIND` constants.
# `bmux_scene_protocol` is referenced by generated qualified type paths
# for the imported `scene.decoration-scene` return of `scene-snapshot`.
ignored = ["serde", "bmux_plugin_sdk", "bmux_scene_protocol"]

[features]
default          = []
fail-on-warnings = []
