[workspace]
members = [
    "examples/hello-plugin",
    "examples/native-plugin",
    "examples/prompt-showcase",
    "examples/prompt-plugin-showcase",
    "packages/attach_pipeline",
    "packages/attach_pipeline/models",
    "packages/bmux",
    "packages/codec",
    "packages/fonts",
    "packages/cli_output",
    "packages/cli",
    "packages/cli-schema",
    "packages/client",
    "packages/clipboard",
    "packages/config",
    "packages/config-doc",
    "packages/config-doc-derive",
    "packages/event",
    "packages/event/models",
    "packages/ipc",
    "packages/keybind",
    "packages/plugin",
    "packages/plugin-schema",
    "packages/plugin-schema-macros",
    "packages/plugin-sdk",
    "packages/perf-tools",
    "packages/server",
    "packages/session",
    "packages/session/models",
    "packages/sandbox-harness",
    "packages/slots",
    "packages/bmux-env",
    "packages/terminal",
    "packages/terminal/models",
    "packages/terminal_protocol",
    "packages/keyboard",
    "packages/mobile-core",
    "packages/mobile-ffi",
    "packages/image",
    "packages/docs-site",
    "packages/docs-site/ui",
    "plugins/clipboard-plugin",
    "plugins/cluster-plugin",
    "plugins/plugin-cli-plugin",
    "plugins/permissions-plugin",
    "plugins/prompted-actions-plugin",
    "plugins/windows-plugin",
    "plugins/windows-plugin-api",
]

resolver = "2"

[workspace.metadata.cargo-machete]
ignored = ["log"]

[profile.release]
codegen-units = 1
lto           = false
opt-level     = 3
strip         = "symbols"

[profile.debug-release]
debug    = true
inherits = "release"
strip    = "none"

[profile.release-lto]
inherits = "release"
lto      = "fat"

[profile.release-lto-no-panic]
inherits = "release-lto"
panic    = "abort"

[profile.small]
inherits  = "release-lto-no-panic"
opt-level = "z"

[profile.fast]
inherits  = "dev"
opt-level = 0

[workspace.package]
authors    = ["Braden Steffaniak"]
edition    = "2024"
license    = "MPL-2.0"
repository = "https://github.com/BSteffaniak/bmux"
version    = "0.0.1-alpha.0"

[workspace.dependencies]
# Internal bmux packages
bmux                        = { version = "0.0.1-alpha.0", default-features = false, path = "packages/bmux" }
bmux_attach_pipeline        = { version = "0.0.1-alpha.0", default-features = false, path = "packages/attach_pipeline" }
bmux_attach_pipeline_models = { version = "0.0.1-alpha.0", default-features = false, path = "packages/attach_pipeline/models" }
bmux_cli                    = { version = "0.0.1-alpha.0", default-features = false, path = "packages/cli" }
bmux_cli_output             = { version = "0.0.1-alpha.0", default-features = false, path = "packages/cli_output" }
bmux_cli_schema             = { version = "0.0.1-alpha.0", default-features = false, path = "packages/cli-schema" }
bmux_client                 = { version = "0.0.1-alpha.0", default-features = false, path = "packages/client" }
bmux_clipboard              = { version = "0.0.1-alpha.0", default-features = false, path = "packages/clipboard" }
bmux_codec                  = { version = "0.0.1-alpha.0", default-features = false, path = "packages/codec" }
bmux_config                 = { version = "0.0.1-alpha.0", default-features = false, path = "packages/config" }
bmux_config_doc             = { version = "0.0.1-alpha.0", default-features = false, path = "packages/config-doc" }
bmux_config_doc_derive      = { version = "0.0.1-alpha.0", default-features = false, path = "packages/config-doc-derive" }
bmux_env                    = { version = "0.0.1-alpha.0", default-features = false, path = "packages/bmux-env" }
bmux_event                  = { version = "0.0.1-alpha.0", default-features = false, path = "packages/event" }
bmux_event_models           = { version = "0.0.1-alpha.0", default-features = false, path = "packages/event/models" }
bmux_fonts                  = { version = "0.0.1-alpha.0", default-features = false, path = "packages/fonts" }
bmux_image                  = { version = "0.0.1-alpha.0", default-features = false, path = "packages/image" }
bmux_ipc                    = { version = "0.0.1-alpha.0", default-features = false, path = "packages/ipc" }
bmux_keybind                = { version = "0.0.1-alpha.0", default-features = false, path = "packages/keybind" }
bmux_keyboard               = { version = "0.0.1-alpha.0", default-features = false, path = "packages/keyboard" }
bmux_mobile_core            = { version = "0.0.1-alpha.0", default-features = false, path = "packages/mobile-core" }
bmux_mobile_ffi             = { version = "0.0.1-alpha.0", default-features = false, path = "packages/mobile-ffi" }
bmux_plugin                 = { version = "0.0.1-alpha.0", default-features = false, path = "packages/plugin" }
bmux_plugin_schema          = { version = "0.0.1-alpha.0", default-features = false, path = "packages/plugin-schema" }
bmux_plugin_schema_macros   = { version = "0.0.1-alpha.0", default-features = false, path = "packages/plugin-schema-macros" }
bmux_plugin_sdk             = { version = "0.0.1-alpha.0", default-features = false, path = "packages/plugin-sdk" }
bmux_sandbox_harness        = { version = "0.0.1-alpha.0", default-features = false, path = "packages/sandbox-harness" }
bmux_server                 = { version = "0.0.1-alpha.0", default-features = false, path = "packages/server" }
bmux_session                = { version = "0.0.1-alpha.0", default-features = false, path = "packages/session" }
bmux_session_models         = { version = "0.0.1-alpha.0", default-features = false, path = "packages/session/models" }
bmux_slots                  = { version = "0.0.1-alpha.0", default-features = false, path = "packages/slots" }
bmux_terminal               = { version = "0.0.1-alpha.0", default-features = false, path = "packages/terminal" }
bmux_terminal_models        = { version = "0.0.1-alpha.0", default-features = false, path = "packages/terminal/models" }
bmux_terminal_protocol      = { version = "0.0.1-alpha.0", default-features = false, path = "packages/terminal_protocol" }

# Bundled plugin crates (used as optional rlib deps in bmux_cli)
bmux_clipboard_plugin        = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/clipboard-plugin" }
bmux_cluster_plugin          = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/cluster-plugin" }
bmux_permissions_plugin      = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/permissions-plugin" }
bmux_plugin_cli_plugin       = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/plugin-cli-plugin" }
bmux_prompted_actions_plugin = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/prompted-actions-plugin" }
bmux_windows_plugin          = { version = "0.0.1-alpha.0", default-features = false, path = "plugins/windows-plugin" }
