name: Release npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to tag)"
        type: string
        required: false
      dry_run:
        description: "Dry run (skip npm publish)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: darwin-arm64
            binary: bmux
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: darwin-x64
            binary: bmux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: linux-arm64
            binary: bmux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: linux-x64
            binary: bmux
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            npm_pkg: linux-x64-musl
            binary: bmux
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: win32-x64
            binary: bmux.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> ~/.cargo/config.toml

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: npm-${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p bmux_cli

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm_pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Place binaries into npm packages
        run: |
          for pkg in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-x64-musl; do
            cp "artifacts/binary-${pkg}/bmux" "./npm/${pkg}/bmux"
            chmod +x "./npm/${pkg}/bmux"
          done
          cp "artifacts/binary-win32-x64/bmux.exe" "./npm/win32-x64/bmux.exe"

      - name: Update npm versions
        shell: bash
        run: ./scripts/release/sync-npm-version.sh "${{ steps.version.outputs.version }}"

      - name: Publish platform packages
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -uo pipefail
          failed=0
          for pkg in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-x64-musl win32-x64; do
            output=$(npm publish "./npm/${pkg}" 2>&1) && continue
            if echo "$output" | grep -q "previously published versions"; then
              continue
            fi
            echo "$output"
            failed=1
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Publish bmux
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          output=$(npm publish ./npm/bmux 2>&1) && exit 0
          if echo "$output" | grep -q "previously published versions"; then
            exit 0
          fi
          echo "$output"
          exit 1

      - name: Publish @bmux/cli
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          output=$(npm publish ./npm/cli 2>&1) && exit 0
          if echo "$output" | grep -q "previously published versions"; then
            exit 0
          fi
          echo "$output"
          exit 1
